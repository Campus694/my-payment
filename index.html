<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата 2.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    background: radial-gradient(circle at 30% 20%, #1c2436, #0b0f15 70%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: #fff;
}

.container {
    width: 100%;
    max-width: 360px; /* уже */
}

.card {
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.card h2 {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 14px;
    letter-spacing: 1px;
}

.select-box {
    padding: 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    font-size: 15px;
}

.input-box {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: 0.2s ease;
}

.input-box:focus {
    border: 1px solid rgba(120,180,255,0.7);
    box-shadow: 0 0 0 2px rgba(120,180,255,0.2);
}

.button {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg,#3a8dff,#6fa8ff);
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    transition: 0.2s ease;
}

.button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(60,130,255,0.4);
}

.result {
    margin-top: 14px;
    font-size: 13px;
    opacity: 0.85;
    word-break: break-all;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>НАПРАВЛЕНИЕ</h2>
        <div class="select-box">Оплата 2.0</div>
    </div>

    <div class="card">
        <h2>СУММА</h2>
        <input type="number" id="amount" class="input-box" placeholder="Введите сумму">
        <button class="button" onclick="generateLink()">Создать ссылку</button>
        <div id="result" class="result"></div>
    </div>

</div>

<script>
async function generateLink() {
    const amountInput = document.getElementById("amount").value;
    const resultDiv = document.getElementById("result");

    if (!amountInput || amountInput % 100 !== 0 || amountInput <= 0) {
        resultDiv.innerText = "Введите сумму";
        return;
    }

    try {
        const response = await fetch('./orders.json');

        if (!response.ok) {
            resultDiv.innerText = "Файл orders.json не найден";
            return;
        }

        const data = await response.json();
        const formattedAmount =
            new Intl.NumberFormat('ru-RU').format(amountInput) + " ₽";

        let foundSubdomain = null;

        for (const key in data) {
            if (data[key].amount === formattedAmount) {
                foundSubdomain = key;
                break;
            }
        }

        if (foundSubdomain) {
            const finalLink =
                `https://shineexpress-pay.online/${foundSubdomain}`;

            resultDiv.innerHTML =
                `<a href="${finalLink}" target="_blank" style="color:#8ec5ff;text-decoration:none;">${finalLink}</a>`;
        } else {
            resultDiv.innerText = "Сумма не найдена";
        }

    } catch (error) {
        resultDiv.innerText = "Ошибка чтения JSON";
    }
}
</script>

</body>
</html>
